# ============================================
# Prometheus Configuration
# Automated Trading System
# ============================================
# Scrapes hardware-level metrics (CPU, RAM, Disk I/O) via Node Exporter
# and application-level metrics from trading engine services.

global:
  scrape_interval: 15s          # Default scrape interval
  evaluation_interval: 15s      # Rule evaluation interval
  scrape_timeout: 10s

# Alerting rules (optional)
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # ------------------------------------------
  # Prometheus Self-Monitoring
  # ------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ------------------------------------------
  # API Gateway Metrics
  # Tracks request counts, latency, WebSocket connections
  # ------------------------------------------
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "api-gateway"

  # ------------------------------------------
  # Node Exporter (System Metrics)
  # CPU utilization, RAM consumption, Disk I/O
  # Port: 9100
  # ------------------------------------------
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]

  # ------------------------------------------
  # QuestDB Metrics
  # ------------------------------------------
  - job_name: "questdb"
    metrics_path: /metrics
    static_configs:
      - targets: ["questdb:9000"]
        labels:
          service: "questdb"
