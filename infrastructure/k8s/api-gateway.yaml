# ============================================
# Kubernetes Deployment - API Gateway
# Automated Trading System
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-api-gateway
  labels:
    app: ats
    component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ats
      component: api-gateway
  template:
    metadata:
      labels:
        app: ats
        component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: ats/api-gateway:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: ats-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: ats-api-gateway
  labels:
    app: ats
    component: api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: ats
    component: api-gateway
