name: automated_trading_system_ui
description: Front-end UI for the Automated Trading System.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  candlesticks: ^2.1.0  # For GPU accelerated charting
  web_socket_channel: ^2.4.0 # For real-time updates from API Gateway
  provider: ^6.1.1 # State management
  google_fonts: ^6.1.0 # Beautiful modern fonts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
