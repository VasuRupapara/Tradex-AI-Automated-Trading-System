# ============================================
# QuestDB Configuration
# Performance Tuning for Automated Trading
# ============================================

# Shared memory for WAL (Write-Ahead Log) operations
# Increase for higher ingestion rates
cairo.sql.copy.buffer.size=8388608

# WAL configuration for maximum ingestion speed
# WAL allows 11M+ rows/sec continuous append
cairo.wal.enabled.default=true
cairo.wal.apply.table.time.quota=300000

# Memory mapping for fast query execution
cairo.sql.page.frame.min.rows=1000
cairo.o3.max.lag=240000000

# HTTP server configuration
http.min.enabled=true
http.bind.to=0.0.0.0:9000

# PostgreSQL wire protocol
pg.enabled=true
pg.net.bind.to=0.0.0.0:8812

# ILP (Influx Line Protocol) for high-speed ingestion
line.tcp.enabled=true
line.tcp.net.bind.to=0.0.0.0:9009

# Telemetry
telemetry.enabled=false
